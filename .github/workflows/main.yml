name: CPBL Auto Scraper

on:
  schedule:
    - cron: '0,30 10-14 * * *'
  workflow_dispatch:

# 🌟 關鍵修復 1：給予雲端機器人「寫入」檔案的權限
permissions:
  contents: write

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      # 🌟 關鍵修復 2：更新套件版本到 v4 和 v5 以消除黃色警告
      - name: 下載你的程式碼
        uses: actions/checkout@v4

      - name: 安裝 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安裝爬蟲套件
        run: |
          pip install requests beautifulsoup4

      - name: 執行爬蟲程式！
        run: python CPBL.py

      # 🌟 關鍵修復 3：更防呆的存檔語法
      - name: 將抓到的比分檔案上傳回 GitHub
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          git add cpbl_score.json
          
          # 檢查檔案有沒有變更，有變更才進行 commit 和 push
          if ! git diff --staged --quiet; then
            git commit -m "自動更新中職比分"
            git push
          else
            echo "沒有新的比分變更，略過上傳。"
          fi
