name: CPBL Auto Scraper

on:
  schedule:
    # 這代表：每天的台灣時間 18:00 到 22:00，每 30 分鐘跑一次 (UTC 時間 10 到 14 點)
    - cron: '0,30 10-14 * * *'
  workflow_dispatch: # 魔法按鈕：允許我們手動按按鈕立刻執行！

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - name: 下載你的程式碼
        uses: actions/checkout@v3

      - name: 安裝 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安裝爬蟲套件 (requests, beautifulsoup4)
        run: |
          pip install requests beautifulsoup4

      - name: 執行爬蟲程式！
        run: python CPBL.py

      - name: 將抓到的比分檔案上傳回 GitHub
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          git add cpbl_score.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "自動更新中職比分" && git push)
